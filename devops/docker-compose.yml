
services:

  mongodb:
    image: mongo:6.0
    container_name: skillhive-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - skillhive-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: skillhive-backend
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/skillswap_chat
      - JWT_SECRET=${JWT_SECRET}
      - CHAT_ENCRYPTION_KEY=${CHAT_ENCRYPTION_KEY}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - skillhive-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/api/health').then(r => r.status === 200 ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: skillhive-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - skillhive-network

  nginx:
    image: nginx:alpine
    container_name: skillhive-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - skillhive-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: skillhive-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    expose:
      - "8080"
    networks:
      - skillhive-network

  prometheus:
    image: prom/prometheus:latest
    container_name: skillhive-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend
      - cadvisor
    networks:
      - skillhive-network

volumes:
  mongo-data:
  prometheus-data:

networks:
  skillhive-network:
    driver: bridge

