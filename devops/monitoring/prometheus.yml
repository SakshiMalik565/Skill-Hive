global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'skillhive-backend'
    metrics_path: '/api/health'
    static_configs:
      - targets: ['backend:5000']

  - job_name: 'skillhive-containers'
    static_configs:
      - targets: ['cadvisor:8080']
